# The bot deploys as wasm, but NO [build].target default is set: a global wasm
# default would force every host-side crate to carry or fake a machine-specific
# override. Install once: rustup target add wasm32-unknown-unknown.
#
# Every crate in this repo is a workspace MEMBER (the workspace is the single place
# to pull/use this code; the root Cargo.toml [patch] table gives clean local
# patching). The host-side crates — screeps-rest-api / pack / prospector /
# server-kit / foreman-bench / ibex-eval — CANNOT build for wasm32 (tokio / bollard /
# reqwest / rayon / image), so the wasm aliases build the whole workspace EXCEPT
# them. A bare `cargo build` and `cargo test-host` DO build/test them, on host.
[alias]
clippy-wasm = ["clippy", "--workspace", "--exclude", "screeps-rest-api", "--exclude", "screeps-pack", "--exclude", "screeps-prospector", "--exclude", "screeps-server-kit", "--exclude", "screeps-foreman-bench", "--exclude", "screeps-ibex-eval", "--exclude", "screeps-rover-eval", "--target", "wasm32-unknown-unknown"]
check-wasm = ["check", "--workspace", "--exclude", "screeps-rest-api", "--exclude", "screeps-pack", "--exclude", "screeps-prospector", "--exclude", "screeps-server-kit", "--exclude", "screeps-foreman-bench", "--exclude", "screeps-ibex-eval", "--exclude", "screeps-rover-eval", "--target", "wasm32-unknown-unknown"]
build-wasm = ["build", "--workspace", "--exclude", "screeps-rest-api", "--exclude", "screeps-pack", "--exclude", "screeps-prospector", "--exclude", "screeps-server-kit", "--exclude", "screeps-foreman-bench", "--exclude", "screeps-ibex-eval", "--exclude", "screeps-rover-eval", "--target", "wasm32-unknown-unknown"]
test-host = ["test"]

# (An earlier `paths` override here was removed — cargo does not apply `paths`
# overrides to git sources; the [patch] table on members is the working mechanism.)
