# Vendored KEYLESS screeps-launcher config template (P0.A2; relocated to
# config/ by P0.A9(b)).
#
# This file is committed and must NEVER contain a steamKey. At runtime the
# kit merges a key in-memory — from `steamKey:` in the gitignored
# `config/local.yml` (documented by config/local.example.yml) — and writes
# the merged result to this crate's target/runtime/config.yml (gitignored),
# which is what gets bind-mounted into the launcher container at
# /screeps/config.yml.
#
# Schema source: screepers/screeps-launcher (main branch), launcher/config.go
# + config.sample.yml + README.md. Kept close to the upstream sample's
# recommended defaults.

# Mods (upstream README "Recommended mods"):
# - screepsmod-mongo: REQUIRED for this stack — switches storage to the
#   mongo+redis containers (reads MONGO_HOST/REDIS_HOST from container env;
#   the launcher passes its own env through to server processes,
#   launcher/server.go `os.Environ()`).
# - screepsmod-auth: password auth (`setPassword`) for the HTTP API.
# - screepsmod-admin-utils: enables the `serverConfig:` section below
#   (tickRate etc.) and extra CLI utilities.
mods:
  - screepsmod-mongo
  - screepsmod-auth
  - screepsmod-admin-utils

# Pin the INSTALLED version of screepsmod-auth. The launcher installs each
# `mods:` entry as `<name>: "*"` (latest) in package.json, but `extraPackages`
# entries override that same dep key (launcher/packages.go writePackage:
# deps[mod]="*" then deps[pkg]=ver), so this forces 2.8.3 while the mod stays
# in `mods:` (and thus in mods.json) to be loaded.
#
# WHY: screepsmod-auth@2.9.0 (published 2026-06-16) CRASHES on load —
# `TypeError: Cannot read properties of undefined (reading 'db')` at
# lib/index.js:123 — so the mod never registers its CLI command (setPassword)
# or REST route (POST /api/auth/signin -> 404), which breaks `deploy` auth.
# 2.8.3 (2026-05-23) was the last working release (deploys worked 2026-06-09).
# (`pinnedPackages`/yarn-resolutions does NOT work here — it only overrides
# nested deps, not a top-level mod.) Re-evaluate when a fixed 2.9.x ships.
# See docs/guides/private-server-commands.md (deploy-auth-404 diagnostic).
extraPackages:
  screepsmod-auth: 2.8.3

# NPC bot AI available to `bots.spawn(...)` (upstream sample default).
bots:
  simplebot: screepsbot-zeswarm

# Backend process env (launcher/config.go ConfigEnv, yaml tag `env`).
# CLI_HOST/CLI_PORT are the *server-side bind* of the screeps CLI server —
# launcher defaults are 127.0.0.1:21026 (config.go NewConfig), i.e.
# unreachable from outside the container. The kit FORCES these at merge
# time regardless of what this file says; they are spelled out here so the
# template documents the intent.
env:
  backend:
    GAME_HOST: 0.0.0.0     # launcher default; the game/API bind
    GAME_PORT: "21025"     # launcher default
    CLI_HOST: 0.0.0.0      # NON-default: bind the CLI for host access
    CLI_PORT: "21026"      # launcher default port, non-default bind

# Requires screepsmod-admin-utils. tickRate is in milliseconds and is a
# lower bound (upstream README). The kit overwrites it at merge time
# with `tickMs` from config/local.yml (default 100; floor 50).
serverConfig:
  tickRate: 100
  welcomeText: |
    <h1 style="text-align: center;">screeps-server-kit private server</h1>
