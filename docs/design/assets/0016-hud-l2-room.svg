<svg viewBox="0 0 1000 1060" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Mono', Consolas, monospace">
  <!-- ADR 0016 mockup: Glance HUD, L2 (Panels) in an owned RCL7 room. 1 tile = 20px. -->
  <defs>
    <clipPath id="room"><rect x="0" y="0" width="1000" height="1000"/></clipPath>
  </defs>

  <!-- ════ room base ════ -->
  <rect x="0" y="0" width="1000" height="1000" fill="#202020"/>
  <g clip-path="url(#room)">
    <!-- grid -->
    <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
      <path d="M100 0V1000 M200 0V1000 M300 0V1000 M400 0V1000 M500 0V1000 M600 0V1000 M700 0V1000 M800 0V1000 M900 0V1000"/>
      <path d="M0 100H1000 M0 200H1000 M0 300H1000 M0 400H1000 M0 500H1000 M0 600H1000 M0 700H1000 M0 800H1000 M0 900H1000"/>
    </g>
    <!-- terrain: walls -->
    <g fill="#161616">
      <path d="M0 0 H1000 V40 Q820 90 640 50 Q400 20 180 70 Q80 90 0 60 Z"/>
      <path d="M0 1000 V930 Q200 900 340 950 Q600 1010 1000 940 V1000 Z"/>
      <path d="M0 200 Q60 260 30 380 Q10 470 40 560 L0 580 Z"/>
      <path d="M1000 300 Q930 380 960 500 Q985 590 950 660 L1000 680 Z"/>
      <ellipse cx="700" cy="760" rx="90" ry="50"/>
    </g>
    <!-- terrain: swamp -->
    <g fill="#2c3018" fill-opacity="0.8">
      <ellipse cx="250" cy="720" rx="120" ry="70"/>
      <ellipse cx="560" cy="180" rx="100" ry="55"/>
    </g>
    <!-- roads -->
    <g stroke="#4a4a4a" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8">
      <path d="M190 330 L370 520 L480 520 L600 640"/>
      <path d="M370 520 L300 760"/>
      <path d="M480 520 L820 770"/>
    </g>
    <!-- structures -->
    <g>
      <!-- sources -->
      <rect x="176" y="316" width="28" height="28" rx="4" fill="#f6e07b"/>
      <rect x="276" y="746" width="28" height="28" rx="4" fill="#f6e07b"/>
      <!-- spawn -->
      <circle cx="430" cy="500" r="22" fill="#3b3b3b" stroke="#aef0ff" stroke-width="2"/>
      <circle cx="430" cy="500" r="11" fill="#aef0ff" opacity="0.85"/>
      <!-- storage -->
      <rect x="500" y="486" width="26" height="32" rx="6" fill="#3b3b3b" stroke="#f0c040" stroke-width="2"/>
      <!-- towers -->
      <circle cx="380" cy="420" r="11" fill="#3b3b3b" stroke="#8b949e" stroke-width="2"/>
      <circle cx="540" cy="580" r="11" fill="#3b3b3b" stroke="#8b949e" stroke-width="2"/>
      <!-- extension cluster -->
      <g fill="#3b3b3b" stroke="#f0c040" stroke-width="1.5">
        <circle cx="468" cy="446" r="7"/><circle cx="488" cy="436" r="7"/><circle cx="508" cy="446" r="7"/>
        <circle cx="468" cy="556" r="7"/><circle cx="488" cy="566" r="7"/><circle cx="508" cy="556" r="7"/>
      </g>
      <!-- controller -->
      <circle cx="820" cy="770" r="16" fill="#3b3b3b" stroke="#9aa7ff" stroke-width="3"/>
      <!-- creeps -->
      <g fill="#7fb1f4">
        <circle cx="240" cy="380" r="8"/><circle cx="356" cy="512" r="8"/><circle cx="560" cy="620" r="8"/>
        <circle cx="296" cy="730" r="8"/><circle cx="780" cy="744" r="8"/>
      </g>
      <!-- squad creeps (damaged) -->
      <circle cx="660" cy="360" r="8" fill="#7fb1f4" stroke="#f85149" stroke-width="2"/>
      <circle cx="688" cy="372" r="8" fill="#7fb1f4" stroke="#f85149" stroke-width="2"/>
      <!-- hostile -->
      <circle cx="920" cy="120" r="8" fill="#f85149"/>
    </g>

    <!-- ════ world-anchored annotations (allowed inside center 40x40) ════ -->
    <!-- source badge: M2 (miners assigned), ok -->
    <g>
      <circle cx="190" cy="304" r="11" fill="#161b22" fill-opacity="0.85" stroke="#30363d"/>
      <text x="190" y="308" font-size="11" fill="#c9d1d9" text-anchor="middle">M2</text>
      <circle cx="202" cy="296" r="3" fill="#3fb950"/>
    </g>
    <!-- source badge: M0, bad (no miner) -->
    <g>
      <circle cx="290" cy="734" r="11" fill="#161b22" fill-opacity="0.85" stroke="#30363d"/>
      <text x="290" y="738" font-size="11" fill="#c9d1d9" text-anchor="middle">M0</text>
      <circle cx="302" cy="726" r="3" fill="#f85149"/>
    </g>
    <!-- controller badge: RCL 7 + progress tick -->
    <g>
      <circle cx="820" cy="742" r="11" fill="#161b22" fill-opacity="0.85" stroke="#30363d"/>
      <text x="820" y="746" font-size="11" fill="#9aa7ff" text-anchor="middle">7</text>
      <rect x="806" y="756" width="28" height="3" fill="#21262d"/>
      <rect x="806" y="756" width="18" height="3" fill="#9aa7ff"/>
    </g>
    <!-- spawn badge: spawning 62% ring -->
    <g>
      <circle cx="430" cy="500" r="28" fill="none" stroke="#58a6ff" stroke-width="3" stroke-dasharray="109 67" stroke-linecap="round" transform="rotate(-90 430 500)"/>
      <text x="430" y="466" font-size="11" fill="#58a6ff" text-anchor="middle">62%</text>
    </g>
    <!-- squad member HP bars (block-char text, drawn only when damaged) + role glyphs -->
    <g font-size="10" text-anchor="middle">
      <text x="660" y="342" fill="#d29922">▮▮▮▯▯</text>
      <text x="660" y="332" fill="#c9d1d9">Q</text>
      <text x="688" y="396" fill="#f85149">▮▯▯▯▯</text>
    </g>
    <!-- squad focus line: centroid -> target -->
    <line x1="674" y1="366" x2="916" y2="124" stroke="#f85149" stroke-width="2" stroke-dasharray="6 4" opacity="0.7"/>
    <!-- stuck marker (exception class, L2 pathing) -->
    <g>
      <circle cx="560" cy="620" r="13" fill="none" stroke="#d29922" stroke-width="2.5"/>
      <text x="560" y="600" font-size="10" fill="#d29922" text-anchor="middle">stuck 9</text>
    </g>
    <!-- immovable marker (exception class, L2 pathing) -->
    <g stroke="#f85149" stroke-width="2.5">
      <line x1="349" y1="505" x2="363" y2="519"/><line x1="363" y1="505" x2="349" y2="519"/>
    </g>

    <!-- center 40x40 exclusion (annotation for the mockup, not drawn in game) -->
    <rect x="100" y="100" width="800" height="800" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="10 8" opacity="0.25"/>
    <text x="500" y="118" font-size="12" fill="#58a6ff" opacity="0.45" text-anchor="middle">center 40×40 — no screen-anchored HUD (world badges only)</text>

    <!-- ════ EMPIRE STRIP (None target, L1+) : y 0.2–1.4 ════ -->
    <g>
      <rect x="20" y="4" width="960" height="24" rx="3" fill="#0d1117" fill-opacity="0.55"/>
      <!-- CPU bar colored by governor tier -->
      <rect x="30" y="10" width="120" height="12" rx="2" fill="#21262d"/>
      <rect x="30" y="10" width="71" height="12" rx="2" fill="#3fb950"/>
      <text x="158" y="20" font-size="12" fill="#c9d1d9">47/80</text>
      <text x="220" y="20" font-size="12" fill="#8b949e">B 9.8k</text>
      <text x="290" y="20" font-size="12" fill="#8b949e">C 84</text>
      <text x="345" y="20" font-size="12" fill="#8b949e">G14 62%</text>
      <text x="430" y="20" font-size="12" fill="#8b949e">R 3/4</text>
      <text x="490" y="20" font-size="12" fill="#8b949e">OPS 5</text>
      <!-- alert badges, right-aligned: WarActive, SpawnStall, HudClipped -->
      <g font-size="11" text-anchor="middle">
        <rect x="880" y="8" width="26" height="16" rx="3" fill="#f85149" fill-opacity="0.25" stroke="#f85149"/>
        <text x="893" y="20" fill="#f85149">WAR</text>
        <circle cx="908" cy="10" r="3.5" fill="#f85149"/>
        <rect x="912" y="8" width="26" height="16" rx="3" fill="#d29922" fill-opacity="0.25" stroke="#d29922"/>
        <text x="925" y="20" fill="#d29922">SPN</text>
        <rect x="944" y="8" width="26" height="16" rx="3" fill="#8b949e" fill-opacity="0.2" stroke="#8b949e"/>
        <text x="957" y="20" fill="#8b949e">CLP</text>
      </g>
    </g>

    <!-- ════ ROOM HEADER STRIP (per room, L2+) : y 1.6–2.8 ════ -->
    <g>
      <rect x="20" y="32" width="960" height="24" rx="3" fill="#0d1117" fill-opacity="0.55"/>
      <text x="28" y="49" font-size="13" fill="#c9d1d9">W7N3 RCL7</text>
      <!-- RCL progress bar -->
      <rect x="160" y="39" width="80" height="10" rx="2" fill="#21262d"/>
      <rect x="160" y="39" width="52" height="10" rx="2" fill="#9aa7ff"/>
      <!-- energy bar + value -->
      <rect x="270" y="39" width="100" height="10" rx="2" fill="#21262d"/>
      <rect x="270" y="39" width="78" height="10" rx="2" fill="#f0c040"/>
      <text x="378" y="49" font-size="12" fill="#8b949e">312k</text>
      <!-- storage sparkline (12 pts) + trend -->
      <polyline points="700,50 712,48 724,49 736,46 748,44 760,45 772,42 784,40 796,41 808,38 820,37 832,35"
                fill="none" stroke="#f0c040" stroke-width="2"/>
      <text x="842" y="46" font-size="12" fill="#3fb950">▲+12k</text>
      <!-- hostiles + intel-age -->
      <rect x="906" y="36" width="24" height="16" rx="3" fill="#f85149" fill-opacity="0.25" stroke="#f85149"/>
      <text x="918" y="48" font-size="11" fill="#f85149" text-anchor="middle">H3</text>
      <circle cx="948" cy="44" r="4" fill="#3fb950"/>
    </g>

    <!-- ════ LEFT RAIL (econ, L2+) : x 0.5–5, exception rows ════ -->
    <g font-size="12">
      <rect x="10" y="78" width="92" height="120" rx="3" fill="#0d1117" fill-opacity="0.5"/>
      <!-- quiet row: nominal population collapsed -->
      <circle cx="20" cy="92" r="4" fill="#3fb950"/>
      <text x="30" y="96" fill="#8b949e">OK 14m 27j</text>
      <!-- exception rows -->
      <circle cx="20" cy="117" r="4" fill="#f85149"/>
      <text x="30" y="121" fill="#c9d1d9">M src2 0/2</text>
      <circle cx="20" cy="142" r="4" fill="#d29922"/>
      <text x="30" y="146" fill="#c9d1d9">U wait 412t</text>
      <circle cx="20" cy="167" r="4" fill="#d29922"/>
      <text x="30" y="171" fill="#c9d1d9">B stall 88t</text>
      <text x="30" y="192" fill="#58a6ff">+2</text>
    </g>

    <!-- ════ GLOBAL OPS RAIL (None target, L2+) : x 44.8–49.5, y 4–20 ════ -->
    <g font-size="12" text-anchor="end">
      <rect x="896" y="78" width="94" height="98" rx="3" fill="#0d1117" fill-opacity="0.5"/>
      <text x="982" y="94" fill="#58a6ff">OPS</text>
      <circle cx="906" cy="115" r="4" fill="#f85149"/>
      <text x="982" y="119" fill="#c9d1d9">A W5N8 p2</text>
      <circle cx="906" cy="140" r="4" fill="#3fb950"/>
      <text x="982" y="144" fill="#c9d1d9">C idle 3/4</text>
      <circle cx="906" cy="165" r="4" fill="#3fb950"/>
      <text x="982" y="169" fill="#c9d1d9">S scout 3</text>
    </g>

    <!-- ════ RIGHT RAIL (room military, L2+) : y 21–45 ════ -->
    <g font-size="12" text-anchor="end">
      <rect x="896" y="420" width="94" height="98" rx="3" fill="#0d1117" fill-opacity="0.5"/>
      <!-- squad chip, below retreat threshold = red border -->
      <rect x="902" y="428" width="84" height="20" rx="9" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
      <text x="980" y="442" fill="#c9d1d9">a 3/4 W5N8</text>
      <!-- defense posture chip -->
      <rect x="902" y="456" width="84" height="20" rx="9" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
      <text x="980" y="470" fill="#3fb950">DEF ON</text>
      <!-- threat badge -->
      <text x="980" y="500" fill="#d29922">THR 42</text>
    </g>

    <!-- ════ BOTTOM STRIP (spawn chips + transfer micro-bars, L2+) : y 46–49.5 ════ -->
    <g>
      <rect x="20" y="920" width="960" height="70" rx="3" fill="#0d1117" fill-opacity="0.55"/>
      <!-- spawn chips -->
      <g font-size="12" text-anchor="middle">
        <rect x="30" y="952" width="112" height="22" rx="10" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
        <text x="86" y="967" fill="#f85149">hauler 750</text>
        <rect x="150" y="952" width="124" height="22" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
        <text x="212" y="967" fill="#c9d1d9">upgrader 1.3k</text>
        <rect x="282" y="952" width="100" height="22" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
        <text x="332" y="967" fill="#c9d1d9">miner 1.8k</text>
        <text x="404" y="967" fill="#58a6ff">+2</text>
      </g>
      <text x="30" y="940" font-size="10" fill="#8b949e">SPAWN</text>
      <!-- transfer micro-bars: supply grows left from center, demand right -->
      <g font-size="11">
        <text x="700" y="940" font-size="10" fill="#8b949e">TRANSFER</text>
        <!-- row E -->
        <text x="712" y="952" fill="#c9d1d9">E</text>
        <line x1="840" y1="941" x2="840" y2="983" stroke="#30363d" stroke-width="1"/>
        <rect x="772" y="943" width="68" height="8" fill="#3fb950"/>
        <rect x="824" y="943" width="16" height="8" fill="#238636"/>
        <rect x="840" y="943" width="30" height="8" fill="#f85149"/>
        <text x="965" y="951" fill="#f85149" text-anchor="end">30k</text>
        <!-- row O -->
        <text x="712" y="966" fill="#c9d1d9">O</text>
        <rect x="812" y="957" width="28" height="8" fill="#3fb950"/>
        <rect x="840" y="957" width="56" height="8" fill="#f85149"/>
        <text x="965" y="965" fill="#f85149" text-anchor="end">56k</text>
        <!-- row K balanced -->
        <text x="712" y="980" fill="#c9d1d9">K</text>
        <circle cx="840" cy="977" r="4" fill="#3fb950"/>
      </g>
    </g>
  </g>

  <!-- ════ legend ════ -->
  <g font-size="12" fill="#8b949e">
    <rect x="0" y="1000" width="1000" height="60" fill="#0d1117"/>
    <text x="20" y="1022">ADR 0016 — Glance HUD @ L2 (Panels).  Edge rails show exceptions only; nominal work collapses to the quiet row.</text>
    <text x="20" y="1042">Glyph = noun, color = verdict:  <tspan fill="#3fb950">●ok</tspan>  <tspan fill="#d29922">●warn</tspan>  <tspan fill="#f85149">●bad</tspan>  <tspan fill="#8b5cf6">●no-intel</tspan>.  Empire strip + OPS rail serialize once to the all-rooms target.</text>
  </g>
</svg>
